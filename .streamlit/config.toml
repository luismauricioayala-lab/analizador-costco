[theme]
# --- ESTILO BLOOMBERG TERMINAL ---
primaryColor = "#FF9900" 
backgroundColor = "#000000"
secondaryBackgroundColor = "#161616"
textColor = "#FF9900"
font = "monospace"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 200

[browser]
gatherUsageStats = true

[client]
toolbarMode = "developer"
showSidebarNavigation = true
