[theme]
# Colores institucionales de Costco
primaryColor = "#005BAA"
# Dejamos que Streamlit gestione el fondo para permitir el Dark Mode nativo
# Si borras 'backgroundColor' y 'textColor', el usuario podrá elegir el modo
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 200 

[browser]
gatherUsageStats = false

[client]
# 'developer' muestra todas las opciones, incluyendo el cambio de tema
# 'minimal' a veces oculta el selector de modo oscuro en versiones nuevas
toolbarMode = "developer" 
showSidebarNavigation = true
