[theme]
primaryColor = "#005BAA"
backgroundColor = "#FFFFFF" 
secondaryBackgroundColor = "#F0F2F6"
textColor = "#1C1C1C"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
# NUEVO: Maximiza la velocidad de subida de datos pesados
maxUploadSize = 200 

[browser]
# NUEVO: Esto devuelve el menú de "Settings" y "Dark Mode" que perdiste
# Al ponerlo en 'true', recuperas el control manual del usuario
gatherUsageStats = true

[client]
# NUEVO: Evita que la app se refresque sola si dejas de usarla un momento
# Muy útil para no gastar peticiones de API en segundo plano
showSidebarNavigation = true
toolbarMode = "minimal"
