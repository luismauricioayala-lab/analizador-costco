[theme]
# El azul característico de Costco para botones y destacados
primaryColor = "#005BAA"

# Fondo principal limpio y profesional
backgroundColor = "#FFFFFF"

# Gris suave para la barra lateral y tarjetas de métricas
secondaryBackgroundColor = "#F0F2F6"

# Texto oscuro para máxima legibilidad
textColor = "#1C1C1C"

# Tipografía moderna
font = "sans serif"

[server]
# Optimización para que la terminal cargue rápido
headless = true
enableCORS = false
enableXsrfProtection = false
